<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Form</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg:#080808;
    --card:#131313;
    --main:#00ffee;
    --text:#ffffff;
}

body{
    min-height:100vh;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:2rem;
    color:var(--text);
}

/* ================= MAIN CONTAINER ================= */

.container{
    width:100%;
    max-width:1100px;
    background:var(--card);
    border-radius:2.5rem;
    overflow:hidden;
    border:1px solid rgba(0,255,238,0.15);
    box-shadow:0 0 30px rgba(0,255,238,0.08);

    display:grid;
    grid-template-columns:420px 1fr;
}

/* ================= LEFT SIDE ================= */

.left-side{
    background:#0d0d0d;
    padding:4rem 3rem;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-right:1px solid rgba(255,255,255,0.05);
}

.left-side h1{
    font-size:3.2rem;
    color:var(--main);
    margin-bottom:2rem;
    text-align:center;
}

.qr{
    width:100%;
    max-width:260px;
    border-radius:1.5rem;
    margin-bottom:2rem;
    border:2px solid rgba(0,255,238,0.2);
}

.info{
    text-align:center;
    color:#bdbdbd;
    line-height:1.8;
    font-size:1.4rem;
}

/* ================= RIGHT SIDE ================= */

.right-side{
    padding:4rem;
}

.form-title{
    font-size:3rem;
    margin-bottom:2rem;
    color:white;
}

form{
    display:flex;
    flex-direction:column;
    gap:1.8rem;
}

.input-box{
    display:flex;
    flex-direction:column;
    gap:0.8rem;
}

label{
    font-size:1.4rem;
    color:#ddd;
}

input{
    width:100%;
    padding:1.4rem;
    border:none;
    outline:none;
    border-radius:1.2rem;
    background:#1d1d1d;
    color:white;
    font-size:1.4rem;
    border:1px solid transparent;
    transition:0.3s ease;
}

input:focus{
    border-color:var(--main);
    box-shadow:0 0 10px rgba(0,255,238,0.2);
}

input::placeholder{
    color:#777;
}

/* ================= FILE UPLOAD ================= */

.upload-area{
    width:100%;
}

.upload-btn{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:1rem;
    padding:1.5rem;
    border-radius:1.2rem;
    background:#1e1e1e;
    border:2px dashed rgba(0,255,238,0.5);
    color:var(--main);
    cursor:pointer;
    font-size:1.4rem;
    transition:0.3s ease;
    text-align:center;
}

.upload-btn:hover{
    background:rgba(0,255,238,0.08);
}

/* ================= FILE PREVIEW ================= */

.file-preview{
    margin-top:1.5rem;
    display:none;
    align-items:center;
    gap:1rem;
    background:#1b1b1b;
    padding:1rem;
    border-radius:1rem;
    border:1px solid rgba(0,255,238,0.15);
}

.file-preview img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:1rem;
}

.file-details{
    flex:1;
}

.file-name{
    font-size:1.3rem;
    color:white;
    word-break:break-all;
}

.file-size{
    font-size:1.2rem;
    color:#aaa;
    margin-top:0.4rem;
}

.success-text{
    color:#00ff88;
    font-size:1.3rem;
    margin-top:1rem;
    display:none;
}

/* ================= BUTTON ================= */

button{
    margin-top:1rem;
    padding:1.5rem;
    border:none;
    border-radius:5rem;
    background:var(--main);
    color:black;
    font-size:1.5rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(0,255,238,0.5);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .left-side{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.05);
        padding:3rem 2rem;
    }

    .right-side{
        padding:3rem 2rem;
    }

    .left-side h1{
        font-size:2.8rem;
    }

    .form-title{
        text-align:center;
        font-size:2.6rem;
    }

}

@media(max-width:500px){

    body{
        padding:1rem;
    }

    .container{
        border-radius:2rem;
    }

    .left-side,
    .right-side{
        padding:2rem 1.5rem;
    }

    .qr{
        max-width:220px;
    }

    .upload-btn{
        font-size:1.3rem;
        padding:1.3rem;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="left-side">

        <h1>Scan & Pay</h1>

        <img src="QR code.jpeg"
        class="qr">

        <p class="info">
            Pay ₹29 using the QR code above.
            After payment, upload the screenshot
            and fill the form details.
        </p>

    </div>

    <div class="right-side">

        <h2 class="form-title">
            Complete Payment
        </h2>

<form id="paymentForm">

        <div class="input-box">

            <label>Your Name</label>

            <input
            type="text"
            id="name"
            placeholder="Enter your name"
            required>

        </div>

        <div class="input-box">

            <label>Email Address</label>

            <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required>

        </div>

        <div class="input-box">

            <label>Template Name</label>

            <input
            type="text"
            id="template"
            readonly>

        </div>

        <div class="input-box">

            <label>UTR Number</label>

            <input
            type="text"
            id="utr"
            placeholder="Enter payment UTR number"
            required>

        </div>

        <div class="upload-area">

            <label
            for="screenshot"
            class="upload-btn">

            📤 Upload Payment Screenshot

            </label>

            <input
            type="file"
            id="screenshot"
            accept="image/*"
            hidden>

            <div class="file-preview"
            id="filePreview">

                <img id="previewImage">

                <div class="file-details">

                    <div class="file-name"
                    id="fileName"></div>

                    <div class="file-size"
                    id="fileSize"></div>

                </div>

            </div>

            <div class="success-text"
            id="successText">

            Screenshot Selected Successfully

            </div>

        </div>

        <button type="submit">

            Submit Payment

        </button>

</form>

    </div>

</div>

<script>

/* ================= TEMPLATE NAME ================= */

const params = new URLSearchParams(window.location.search);

const templateName = params.get("template");

document.getElementById("template").value = templateName || "";

/* ================= FORM SUBMIT ================= */

const paymentForm = document.getElementById("paymentForm");

paymentForm.addEventListener("submit", async function(e){

    e.preventDefault();

    const button = document.querySelector("button");

    button.innerText = "Submitting...";
    button.disabled = true;

    const formData = new FormData();

    /* REPLACE THESE ENTRY IDs WITH YOUR REAL IDs */

    formData.append(
    "entry.1592136715",
    document.getElementById("name").value
);

formData.append(
    "entry.1970011121",
    document.getElementById("email").value
);

formData.append(
    "entry.1044563917",
    document.getElementById("template").value
);

formData.append(
    "entry.446561530",
    document.getElementById("utr").value
);

    await fetch(
        "https://docs.google.com/forms/d/e/1FAIpQLSe8glxlBu5OsPhxVboPlJ7VlIqYLFZxccfZlKKEdZhS39b4KQ/formResponse",
        {
            method: "POST",
            mode: "no-cors",
            body: formData
        }
    );

    window.location.href = "payment-success.html";

});

/* ================= FILE PREVIEW ================= */

const screenshotInput = document.getElementById("screenshot");

const filePreview = document.getElementById("filePreview");

const previewImage = document.getElementById("previewImage");

const fileName = document.getElementById("fileName");

const fileSize = document.getElementById("fileSize");

const successText = document.getElementById("successText");

screenshotInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {

        filePreview.style.display = "flex";

        successText.style.display = "block";

        fileName.innerText = file.name;

        fileSize.innerText =
        (file.size / 1024).toFixed(2) + " KB";

        const reader = new FileReader();

        reader.onload = function (e) {

            previewImage.src = e.target.result;

        };

        reader.readAsDataURL(file);

    }

});

</script>

</body>
</html>
