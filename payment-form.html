<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Form</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg:#080808;
    --card:#131313;
    --main:#00ffee;
    --text:#ffffff;
}

body{
    min-height:100vh;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    color:var(--text);
}

/* ================= CONTAINER ================= */

.container{
    width:100%;
    max-width:1150px;
    background:var(--card);
    border-radius:30px;
    overflow:hidden;
    border:1px solid rgba(0,255,238,0.12);
    box-shadow:0 0 35px rgba(0,255,238,0.08);

    display:grid;
    grid-template-columns:380px 1fr;
}

/* ================= LEFT SIDE ================= */

.left-side{
    background:#0d0d0d;
    padding:45px 30px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    border-right:1px solid rgba(255,255,255,0.06);
}

.left-side h1{
    font-size:2.7rem;
    color:var(--main);
    margin-bottom:25px;
    text-align:center;
}

.qr{
    width:100%;
    max-width:250px;
    border-radius:20px;
    border:2px solid rgba(0,255,238,0.18);
    margin-bottom:25px;
}

.info{
    text-align:center;
    color:#bdbdbd;
    line-height:1.7;
    font-size:1rem;
    max-width:280px;
}

/* ================= RIGHT SIDE ================= */

.right-side{
    padding:50px;
}

.form-title{
    font-size:2.4rem;
    margin-bottom:30px;
    color:white;
}

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* ================= INPUTS ================= */

.input-box{
    display:flex;
    flex-direction:column;
    gap:8px;
}

label{
    font-size:1rem;
    color:#ddd;
    font-weight:500;
}

input{
    width:100%;
    padding:15px 18px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1d1d1d;
    color:white;
    font-size:1rem;
    border:1px solid transparent;
    transition:0.3s ease;
}

input:focus{
    border-color:var(--main);
    box-shadow:0 0 12px rgba(0,255,238,0.15);
}

input::placeholder{
    color:#777;
}

/* ================= BUTTON ================= */

.submit-btn{
    margin-top:10px;
    padding:16px;
    border:none;
    border-radius:50px;
    background:var(--main);
    color:black;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s ease;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(0,255,238,0.45);
}

.submit-btn:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* ================= LARGE LAPTOPS ================= */

@media(max-width:1200px){

    .container{
        max-width:1000px;
    }

    .right-side{
        padding:40px;
    }

}

/* ================= TABLETS ================= */

@media(max-width:900px){

    body{
        padding:18px;
    }

    .container{
        grid-template-columns:1fr;
    }

    .left-side{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.05);
        padding:35px 25px;
    }

    .right-side{
        padding:35px 25px;
    }

    .left-side h1{
        font-size:2.3rem;
    }

    .form-title{
        text-align:center;
        font-size:2rem;
    }

    .info{
        font-size:0.95rem;
    }

}

/* ================= MOBILE ================= */

@media(max-width:600px){

    body{
        padding:12px;
        align-items:flex-start;
    }

    .container{
        border-radius:22px;
    }

    .left-side,
    .right-side{
        padding:25px 18px;
    }

    .left-side h1{
        font-size:2rem;
        margin-bottom:20px;
    }

    .qr{
        max-width:210px;
    }

    .form-title{
        font-size:1.7rem;
        margin-bottom:20px;
    }

    input{
        padding:14px;
        font-size:0.95rem;
    }

    .submit-btn{
        padding:15px;
        font-size:1rem;
    }

    label{
        font-size:0.95rem;
    }

    .info{
        font-size:0.9rem;
        line-height:1.6;
    }

}

/* ================= EXTRA SMALL DEVICES ================= */

@media(max-width:380px){

    .left-side h1{
        font-size:1.7rem;
    }

    .form-title{
        font-size:1.5rem;
    }

    .qr{
        max-width:180px;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="left-side">

        <h1>Scan & Pay</h1>

        <img src="QR code.jpeg"
        class="qr">

        <p class="info">
            Pay ₹29 using the QR code above.
            Copy the UTR number to Paste it Below.
            After submitting, You will redirect to whatsapp to send the screenshot 
        </p>

    </div>

    <div class="right-side">

        <h2 class="form-title">
            Complete Payment
        </h2>

<form
id="paymentForm"
action="https://api.web3forms.com/submit"
method="POST">

   <!-- ACCESS KEY -->

<input
type="hidden"
name="access_key"
value="f5448806-8e1f-4c28-9f60-0377901c4ed5">

<!-- SUBJECT -->

<input
type="hidden"
name="subject"
value="New Payment Submission">

<!-- FROM NAME -->

<input
type="hidden"
name="from_name"
value="Payment Website">


    <!-- NAME -->

    <div class="input-box">

        <label>Full Name</label>

        <input
        type="text"
        id="name"
        name="name"
        placeholder="Enter your full name"
        required>

    </div>

    <!-- EMAIL -->

    <div class="input-box">

        <label>Email Address</label>

        <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required>

    </div>

    <!-- PHONE -->

    <div class="input-box">

        <label>Phone Number</label>

        <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Enter your WhatsApp number"
        required>

    </div>

    <!-- TEMPLATE -->

    <div class="input-box">

        <label>Selected Template</label>

        <input
        type="text"
        id="template"
        name="template"
        readonly>

    </div>

    <!-- UTR -->

    <div class="input-box">

        <label>UTR Number</label>

        <input
        type="text"
        id="utr"
        name="utr"
        placeholder="Enter payment UTR number"
        required>

    </div>

    <!-- SUBMIT BUTTON -->

    <button
    type="submit"
    class="submit-btn">

        Submit Payment

    </button>

</form>

    </div>

</div>

<script>

/* ================= TEMPLATE AUTO FILL ================= */

const params = new URLSearchParams(window.location.search);

const templateName =
params.get("template");

document.getElementById("template").value =
templateName || "";

/* ================= FORM SUBMIT ================= */

const paymentForm =
document.getElementById("paymentForm");

paymentForm.addEventListener(
"submit",
async function(e){

e.preventDefault();

const button =
document.querySelector("button");

button.innerText =
"Submitting...";

button.disabled = true;

/* FORM DATA */

const formData =
new FormData(paymentForm);

try{

const response =
await fetch(
"https://api.web3forms.com/submit",
{
method:"POST",
body:formData
}
);

const result =
await response.json();

if(result.success){

window.location.href =
"payment-success.html";

}
else{

alert("Submission Failed");

button.innerText =
"Submit Payment";

button.disabled = false;

}

}

catch(error){

alert("Something went wrong");

button.innerText =
"Submit Payment";

button.disabled = false;

}

});

</script>

</body>
</html>
