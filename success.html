<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent</title>

  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins,sans-serif;
    }

    body{
      background:#080808;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .success-box{
      text-align:center;
      padding:4rem;
      border:2px solid #00ffee;
      border-radius:30px;
      background:#131313;
      width:90%;
      max-width:600px;
      box-shadow:0 0 30px rgba(0,255,238,0.3);
      animation:fadeIn 1s ease;
    }

    .success-box i{
      font-size:8rem;
      color:#00ffee;
      margin-bottom:2rem;
      animation:pop 1s ease infinite alternate;
    }

    .success-box h1{
      font-size:4rem;
      margin-bottom:1.5rem;
    }

    .success-box p{
      font-size:1.7rem;
      line-height:1.8;
      color:#ccc;
      margin-bottom:3rem;
    }

    .btn{
      display:inline-block;
      padding:1.2rem 3rem;
      border-radius:40px;
      background:#00ffee;
      color:black;
      text-decoration:none;
      font-size:1.6rem;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px #00ffee;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes pop{
      from{
        transform:scale(1);
      }

      to{
        transform:scale(1.1);
      }
    }

    @media(max-width:600px){

      html{
        font-size:55%;
      }

      .success-box{
        padding:3rem 2rem;
      }

      .success-box h1{
        font-size:3rem;
      }
    }

  </style>
</head>

<body>

  <div class="success-box">

    <i class='bx bxs-check-circle'></i>

    <h1>Message Sent!</h1>

    <p>
      Thank you for contacting me.  
      I received your message successfully and will get back to you soon.
    </p>

    <a href="index.html" class="btn">
      Back To Portfolio
    </a>

  </div>

</body>
</html>
